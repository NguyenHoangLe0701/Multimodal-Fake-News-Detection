name: Multimodal Fake News CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════
  # Stage 1: Backend Build, Test & Security
  # ═══════════════════════════════════════════════════════
  backend-test:
    name: 🐍 Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pytest pytest-cov
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Lint with Ruff
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          ruff check backend/ --select=E9,F63,F7,F82 --output-format=github

      - name: Security Scan with Bandit
        run: bandit -r backend/ -ll -ii

      - name: Test with pytest
        run: |
          cd backend
          pytest --cov=app --cov-report=xml

      # Uncomment below once SonarCloud is fully set up in the repository settings
      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ═══════════════════════════════════════════════════════
  # Stage 2: Frontend Build, Test & Lint
  # ═══════════════════════════════════════════════════════
  frontend-test:
    name: 🎨 Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --ignore-scripts

      - name: Lint check
        run: cd frontend && npm run lint

      - name: Test Frontend
        run: cd frontend && npm run coverage

      - name: Build Frontend
        run: cd frontend && npm run build

      # Uncomment below once SonarCloud is fully set up in the repository settings
      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ═══════════════════════════════════════════════════════
  # Stage 3: Docker Build & Push (Only on main branch)
  # ═══════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build & Push
    needs: [backend-test, frontend-test]
    permissions:
      contents: read
      packages: write
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: multimodal-fake-news-backend, dockerfile: backend/Dockerfile, context: backend }
          - { name: multimodal-fake-news-frontend, dockerfile: frontend/Dockerfile, context: frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/${{ matrix.service.name }}:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════
  # Stage 4: Deploy to Kubernetes (GitOps via ArgoCD)
  # ═══════════════════════════════════════════════════════
  deploy-to-k8s:
    name: 🚀 Deploy to Kubernetes (GitOps)
    needs: [docker-build]
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update Image Tag for ArgoCD
        run: |
          # Cập nhật tag image trong values.yaml thành commit SHA hiện tại
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" infrastructure/helm/multimodal-fake-news/values.yaml
          
          git config --global user.name 'GitHub Actions (Fake News CI/CD)'
          git config --global user.email 'actions@github.com'
          git add infrastructure/helm/multimodal-fake-news/values.yaml
          
          # Skip CI trigger để tránh infinite loop
          git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main || echo "Failed to push"
