sonar.projectKey=multimodal-fake-news-detection
sonar.organization=your-org-name

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Multimodal Fake News Detection
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=frontend/src,backend
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/tests/**,**/*.test.jsx

# Coverage reporting
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=backend/coverage.xml

# Language settings
sonar.language=js,py
